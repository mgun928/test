        section#main p{
            padding: 10px;
            font-size: 0.95em;

        }
        aside#photos img{

        footer{

            height: 60px;

            background-color: #eeeeee;

        .product-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        }
        .product-card {

        padding: 10px;
        text-align: center;
        }
        .product-img {
        background-color: #cce5f5;
        width: 240px;
        height: 200px;
        display: flex;
        margin: 0 auto 10px auto;

        }
        .product-img img{
            width: 100%;
            height: 100%;
        }
        .product-price {
        color: #4a90b8;
        }

        a:link {
            color: white;
            text-decoration: none;
        }

        a:visited {
            color: white;
            text-decoration: none;
