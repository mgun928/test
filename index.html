<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MG ELECTRONICS</title>

    <style>
        @font-face {
            font-family: 'Paperozi';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-4Regular.woff2') format('woff2');
            font-weight: 400;
            font-display: swap;
        }

        @font-face {
            font-family: 'Paperozi700';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-7Bold.woff2') format('woff2');
            font-weight: 700;
            font-display: swap;
        }   

        @font-face {
            font-family: 'Paperozi900';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-9Black.woff2') format('woff2');
            font-weight: 900;
            font-display: swap;
        }

        *{
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        ul{
            list-style-type: none;
        }
        body{
            font-family:'Paperozi'
        }

        /* Header 영역 */
        header{
            background-color: #0a0f1e;
            color: white;
            padding: 20px;
            display: flex;
        }
        header h3{
            padding: 2px;
            border-radius: 5px;
            border-color: white;
            border: solid 2px;
            margin-right: 60px;
            font-family: "Paperozi900";
        }
        header ul{
            display: flex
        }
        header nav li{
            margin-top: 4px;
            margin-right: 20px;
        }

        header  a{
            text-decoration: none;
            color: white;
        }
        header nav a:hover{
            color:#7eb8f7;
        }
        header nav a:active{
            color: #4a90d9;
        }
        /* header 영역*/

        /* main영역 */
        /* banner part */
        .banner{
            background-image: url(banner.avif);
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center center;
            padding-top: 270px;
            padding-bottom: 270px;
        }
        .banner h1{
            font-style: italic;
            font-family: Paperozi700;
            font-size: 50px;
            color: white;
            margin-left: 60px;
        }
        .banner a{
            text-decoration: none;
            display: block; /*a태그는 인라인이여서 세로 방향 padding,margin이 안먹힘!*/
            margin-left: 70px;
            margin-top: 10px;
            color: white;
            font-size: 20px;
            font-family: Paperozi700;
        }

        /* product part */
        .product h2{
            margin-left: 50px;
            margin-top: 30px;
        }

        section#main{
            padding: 15px;
        }

        .product-grid {
        display: flex;
        margin: 10px 0 0 0 ;
        }
        .product-card {
        border: 1px solid #ddd;
        padding: 10px;
        text-align: center;
        width: 25%;
        }
        .product-img {
        background-color: #cce5f5;
        width: 200px;
        height: 200px;
        display: flex;
        margin: 0 auto 10px auto;
        /* margin-bottom: 10px; */
        }
        .product-img img{
            width: 100%;
            height: 100%
        }
        .product-price {
        margin-top: 5px;
        color: red;
        }

        .buy{
            background-color: #111;
            color: white;     
            font-family: Paperozi;    
            border: none;              
            border-radius: 50px;       
            padding: 12px 40px;      
            margin-top: 10px;   
            font-size: 14px;
        }
        .buy:hover{
            background-color:#333;
        }
        /* main영역 */

        /* footer영역 */
        footer{
            background-color: #0a0f1e;
            padding: 20px;
        }
        footer a{
            color: gray;    
            text-decoration: none;
            font-size: 12px;
        }
        footer span{
            color: gray;
            font-size: 12px;
        }


@media (max-width: 768px) {

    header {
            flex-wrap: wrap;
        }
    .banner {
        padding-top: 100px;
        padding-bottom: 100px;
    }

    .banner h1 {
        font-size: 28px;
        margin-left: 20px;
    }

    .banner a {
        margin-left: 20px;
    }

    /* 상품 카드 세로로 */
    .product-grid {
        display: block;
    }

    .product-card {
        width: 100%;
        margin-bottom: 16px;
    }

}
    </style>
</head>

<body>
    <header>
        <h3><a href="index.html">MG ELECTRONICS</a> </h3>
        <nav>
            <ul>
                <li><a href="index_intro.html">회사 소개</a></li>
                <li><a href="index_mobile.html">모바일</a></li>
                <li><a href="index_kitchen.html">주방가전</a></li>
                <li><a href="index_TV_life.html">TV/생활가전</a></li>
                <li><a href="index_event.html">이벤트 </a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="banner">
            <h1>MG ELECTRONICS &nbsp; 더 스마트한 내일</h1>
            <a href="index_intro.html"> > &nbsp;상세정보</a>

        </div>
        <div class="product">
            <h2>인기상품</h2>

        <section id="main">
        <div class="product-grid">
            <div class="product-card">
                <div class="product-img"><img src="phone1.avif"></div>
                <p class="product-name">MG phone25</p>
                <p class="product-price">₩ 250,000</p>
                <button class="buy">구매하기</button>
            </div>

            <div class="product-card">
                <div class="product-img"><img src="phone2.jpg"></div>
                <p class="product-name">MG phone26</p>
                <p class="product-price">₩ 560,000</p>
                <button class="buy">구매하기</button>
            </div>

            <div class="product-card">
                <div class="product-img"><img src="tablet1.jpg"></div>
                <p class="product-name">MG pad25</p>
                <p class="product-price">₩ 450,000</p>
                <button class="buy">구매하기</button>
            </div>

            <div class="product-card">
                <div class="product-img"><img src="tablet2.jpg"></div>
                <p class="product-name">MG pad26</p>
                <p class="product-price">₩ 800,000</p>
                <button class="buy">구매하기</button>
            </div>
        </div>
        </section>
        </div>
    </main>

    <footer>
        <a href="#">고객센터</a>
        <span>|</span>
        <a href="#">이용약관</a>
        <span>|</span>
        <a href="#">개인정보처리방침</a>
        <span>|</span>
        <span>© MG Electronics</span>
    </footer>
</body>
</html>
